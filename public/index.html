<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Game</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
        }
        
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 14px;
            border-radius: 10px;
            z-index: 10;
            line-height: 1.4;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
            background: radial-gradient(circle at 20% 20%, #1a1a2e 0%, #050510 35%, #000000 100%);
        }
    </style>
</head>

<body>
    <div id="hud">Verbinde...</div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const hud = document.getElementById("hud");

        const WORLD_WIDTH = 5000;
        const WORLD_HEIGHT = 5000;
        const MAX_SPEED = 5;

        const players = {};
        let myId = null;

        const npcs = [{
            id: 1,
            x: 900,
            y: 900,
            radius: 22,
            hp: 100,
            maxHp: 100,
            color: "#ff9933"
        }, {
            id: 2,
            x: 1400,
            y: 1100,
            radius: 22,
            hp: 100,
            maxHp: 100,
            color: "#ff9933"
        }, {
            id: 3,
            x: 1800,
            y: 1500,
            radius: 22,
            hp: 100,
            maxHp: 100,
            color: "#ff9933"
        }];

        let selectedNpcId = null;
        let attacking = false;

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let targetMode = false;
        let targetX = 0;
        let targetY = 0;
        let mouseDownTime = 0;
        let movedWhileHolding = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function getCameraOffset() {
            if (!myId || !players[myId]) {
                return {
                    x: 0,
                    y: 0
                };
            }

            const me = players[myId];

            return {
                x: me.x - canvas.width / 2,
                y: me.y - canvas.height / 2
            };
        }

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            const camera = getCameraOffset();

            return {
                x: (event.clientX - rect.left) + camera.x,
                y: (event.clientY - rect.top) + camera.y
            };
        }

        function getNpcAtPosition(worldX, worldY) {
            for (const npc of npcs) {
                const dx = worldX - npc.x;
                const dy = worldY - npc.y;
                const distance = Math.hypot(dx, dy);

                if (distance <= npc.radius) {
                    return npc;
                }
            }
            return null;
        }

        function drawStars(camera) {
            for (let i = 0; i < 500; i++) {
                const x = ((i * 97) % WORLD_WIDTH) - camera.x;
                const y = ((i * 53) % WORLD_HEIGHT) - camera.y;

                ctx.fillStyle = "white";
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawShip(x, y, angle, color, isMe) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(11, 12);
            ctx.lineTo(0, 6);
            ctx.lineTo(-11, 12);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();

            if (isMe) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawNpc(npc, camera) {
            const screenX = npc.x - camera.x;
            const screenY = npc.y - camera.y;

            ctx.beginPath();
            ctx.arc(screenX, screenY, npc.radius, 0, Math.PI * 2);
            ctx.fillStyle = npc.color;
            ctx.fill();

            if (npc.id === selectedNpcId) {
                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 3;
                ctx.stroke();

                const barWidth = 50;
                const barHeight = 6;
                const hpRatio = npc.hp / npc.maxHp;

                ctx.fillStyle = "#222";
                ctx.fillRect(screenX - barWidth / 2, screenY - 36, barWidth, barHeight);

                ctx.fillStyle = "#ff4444";
                ctx.fillRect(screenX - barWidth / 2, screenY - 36, barWidth * hpRatio, barHeight);
            }
        }

        function updateMovement() {
            if (!myId || !players[myId]) return;

            const me = players[myId];

            if (typeof me.speed !== "number") me.speed = 0;
            if (typeof me.vx !== "number") me.vx = 0;
            if (typeof me.vy !== "number") me.vy = 0;
            if (typeof me.angle !== "number") me.angle = 0;

            let targetXLocal = me.x;
            let targetYLocal = me.y;

            if (mouseDown) {
                targetXLocal = mouseX;
                targetYLocal = mouseY;
            } else if (targetMode) {
                targetXLocal = targetX;
                targetYLocal = targetY;
            } else {
                me.speed *= 0.9;
            }

            const dx = targetXLocal - me.x;
            const dy = targetYLocal - me.y;
            const distance = Math.hypot(dx, dy);

            if (distance > 3) {
                me.speed += 0.3;
                me.speed = Math.min(me.speed, MAX_SPEED);

                const moveAngle = Math.atan2(dy, dx);

                me.vx = Math.cos(moveAngle) * me.speed;
                me.vy = Math.sin(moveAngle) * me.speed;
            } else {
                if (targetMode) {
                    targetMode = false;
                }

                me.speed *= 0.85;
                me.vx *= 0.85;
                me.vy *= 0.85;
            }

            me.x += me.vx;
            me.y += me.vy;

            me.x = Math.max(10, Math.min(WORLD_WIDTH - 10, me.x));
            me.y = Math.max(10, Math.min(WORLD_HEIGHT - 10, me.y));

            if (attacking && selectedNpcId !== null) {
                const npc = npcs.find(n => n.id === selectedNpcId);

                if (npc) {
                    const aimDx = npc.x - me.x;
                    const aimDy = npc.y - me.y;
                    me.angle = Math.atan2(aimDy, aimDx) + Math.PI / 2;
                }
            } else {
                if (Math.abs(me.vx) > 0.01 || Math.abs(me.vy) > 0.01) {
                    me.angle = Math.atan2(me.vy, me.vx) + Math.PI / 2;
                }
            }

            socket.emit("move", {
                x: me.x,
                y: me.y,
                angle: me.angle
            });
        }

        function updateHud() {
            if (!myId || !players[myId]) {
                hud.textContent = "Verbinde...";
                return;
            }

            let text = "Verbunden";

            if (selectedNpcId !== null) {
                text += " | Ziel: NPC " + selectedNpcId;
            }

            if (attacking) {
                text += " | Angriff aktiv";
            }

            text += " | ESC = Ziel löschen | STRG = Angriff an/aus";

            hud.textContent = text;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camera = getCameraOffset();

            drawStars(camera);

            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 4;
            ctx.strokeRect(-camera.x, -camera.y,
                WORLD_WIDTH,
                WORLD_HEIGHT
            );

            for (const npc of npcs) {
                drawNpc(npc, camera);
            }

            for (const id in players) {
                const p = players[id];

                drawShip(
                    p.x - camera.x,
                    p.y - camera.y,
                    p.angle || 0,
                    p.color || "#4da6ff",
                    id === myId
                );
            }

            updateHud();
            requestAnimationFrame(gameLoop);
        }

        socket.on("connect", () => {
            myId = socket.id;
            hud.textContent = "Verbunden";
        });

        socket.on("currentPlayers", (serverPlayers) => {
            for (const id in serverPlayers) {
                players[id] = serverPlayers[id];
            }
        });

        socket.on("newPlayer", (player) => {
            players[player.id] = player;
        });

        socket.on("playerMoved", (player) => {
            if (player.id === myId) return;

            if (!players[player.id]) {
                players[player.id] = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle || 0,
                    color: "#4da6ff"
                };
            } else {
                players[player.id].x = player.x;
                players[player.id].y = player.y;
                players[player.id].angle = player.angle || 0;
            }
        });

        socket.on("playerDisconnected", (id) => {
            delete players[id];
        });

        canvas.addEventListener("mousemove", (event) => {
            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            if (mouseDown) {
                movedWhileHolding = true;
            }
        });

        canvas.addEventListener("mousedown", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            const clickedNpc = getNpcAtPosition(pos.x, pos.y);

            if (clickedNpc) {
                selectedNpcId = clickedNpc.id;
                mouseDown = false;
                targetMode = false;
                return;
            }

            mouseDown = true;
            mouseDownTime = Date.now();
            movedWhileHolding = false;
            targetMode = false;
        });

        canvas.addEventListener("dblclick", (event) => {
            const pos = getMousePos(event);
            const clickedNpc = getNpcAtPosition(pos.x, pos.y);

            if (clickedNpc) {
                selectedNpcId = clickedNpc.id;
                attacking = true;
            }
        });

        canvas.addEventListener("mouseup", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            const holdDuration = Date.now() - mouseDownTime;

            mouseDown = false;

            if (holdDuration < 180 && !movedWhileHolding) {
                targetX = pos.x;
                targetY = pos.y;
                targetMode = true;
            }
        });

        canvas.addEventListener("mouseleave", () => {
            mouseDown = false;
        });

        window.addEventListener("keydown", (event) => {
            if (event.key === "Control") {
                if (selectedNpcId !== null) {
                    attacking = !attacking;
                }
            }

            if (event.key === "Escape") {
                attacking = false;
                selectedNpcId = null;
            }
        });

        window.addEventListener("resize", resizeCanvas);

        resizeCanvas();
        setInterval(updateMovement, 1000 / 60);
        gameLoop();
    </script>
</body>

</html>
