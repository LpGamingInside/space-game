<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Game</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
        }
        
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.58);
            padding: 10px 14px;
            border-radius: 10px;
            z-index: 10;
            line-height: 1.5;
            min-width: 380px;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
            background: radial-gradient(circle at 20% 20%, #1a1a2e 0%, #050510 35%, #000000 100%);
        }
    </style>
</head>

<body>
    <div id="hud">Verbinde...</div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const hud = document.getElementById("hud");

        const WORLD_WIDTH = 5000;
        const WORLD_HEIGHT = 5000;

        const MAX_SPEED = 5;

        const LASER_RANGE = 700;
        const LASER_DAMAGE = 10;
        const LASER_COOLDOWN = 400;

        const NPC_ATTACK_RANGE = 260;
        const NPC_CHASE_RANGE = 500;
        const NPC_LOSE_RANGE = 700;
        const NPC_DAMAGE = 8;
        const NPC_ATTACK_COOLDOWN = 900;

        const PLAYER_MAX_HP = 200;
        const PLAYER_RESPAWN_TIME = 3000;

        const players = {};
        let myId = null;

        const npcs = [{
            id: 1,
            x: 900,
            y: 900,
            radius: 22,
            hp: 100,
            maxHp: 100,
            color: "#ff9933",
            homeX: 900,
            homeY: 900,
            moveAngle: 0.8,
            moveSpeed: 1.1,
            chaseSpeed: 1.8,
            roamRadius: 180,
            lastAttackTime: 0,
            state: "roam",
            rewardCredits: 120,
            rewardCrystals: 4
        }, {
            id: 2,
            x: 1400,
            y: 1100,
            radius: 22,
            hp: 120,
            maxHp: 120,
            color: "#ff9933",
            homeX: 1400,
            homeY: 1100,
            moveAngle: 2.1,
            moveSpeed: 0.9,
            chaseSpeed: 1.7,
            roamRadius: 160,
            lastAttackTime: 0,
            state: "roam",
            rewardCredits: 150,
            rewardCrystals: 5
        }, {
            id: 3,
            x: 1800,
            y: 1500,
            radius: 22,
            hp: 150,
            maxHp: 150,
            color: "#ff9933",
            homeX: 1800,
            homeY: 1500,
            moveAngle: 4.2,
            moveSpeed: 1.0,
            chaseSpeed: 2.0,
            roamRadius: 200,
            lastAttackTime: 0,
            state: "roam",
            rewardCredits: 220,
            rewardCrystals: 8
        }];

        const lasers = [];
        const npcLasers = [];
        const explosions = [];

        let selectedNpcId = null;
        let attacking = false;
        let lastShotTime = 0;

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let targetMode = false;
        let targetX = 0;
        let targetY = 0;
        let mouseDownTime = 0;
        let movedWhileHolding = false;

        let credits = 0;
        let crystals = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function ensureMyPlayerDefaults() {
            if (!myId || !players[myId]) return;

            const me = players[myId];

            if (typeof me.speed !== "number") me.speed = 0;
            if (typeof me.vx !== "number") me.vx = 0;
            if (typeof me.vy !== "number") me.vy = 0;
            if (typeof me.angle !== "number") me.angle = 0;
            if (typeof me.hp !== "number") me.hp = PLAYER_MAX_HP;
            if (typeof me.maxHp !== "number") me.maxHp = PLAYER_MAX_HP;
            if (typeof me.isDead !== "boolean") me.isDead = false;
            if (typeof me.respawnAt !== "number") me.respawnAt = 0;
        }

        function getCameraOffset() {
            if (!myId || !players[myId]) {
                return {
                    x: 0,
                    y: 0
                };
            }

            const me = players[myId];

            return {
                x: me.x - canvas.width / 2,
                y: me.y - canvas.height / 2
            };
        }

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            const camera = getCameraOffset();

            return {
                x: (event.clientX - rect.left) + camera.x,
                y: (event.clientY - rect.top) + camera.y
            };
        }

        function getNpcAtPosition(worldX, worldY) {
            for (const npc of npcs) {
                const dx = worldX - npc.x;
                const dy = worldY - npc.y;
                const distance = Math.hypot(dx, dy);

                if (distance <= npc.radius) {
                    return npc;
                }
            }
            return null;
        }

        function getSelectedNpc() {
            if (selectedNpcId === null) return null;
            return npcs.find(npc => npc.id === selectedNpcId) || null;
        }

        function getMyPlayer() {
            if (!myId || !players[myId]) return null;
            ensureMyPlayerDefaults();
            return players[myId];
        }

        function distanceBetween(aX, aY, bX, bY) {
            return Math.hypot(bX - aX, bY - aY);
        }

        function createExplosion(x, y, color = "#ff9933", maxRadius = 36) {
            explosions.push({
                x,
                y,
                color,
                radius: 4,
                maxRadius,
                alpha: 1
            });
        }

        function drawStars(camera) {
            for (let i = 0; i < 500; i++) {
                const x = ((i * 97) % WORLD_WIDTH) - camera.x;
                const y = ((i * 53) % WORLD_HEIGHT) - camera.y;

                ctx.fillStyle = "white";
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawShip(x, y, angle, color, isMe, isDead) {
            if (isDead) return;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(11, 12);
            ctx.lineTo(0, 6);
            ctx.lineTo(-11, 12);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();

            if (isMe) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawPlayerHpBar(player, camera, isMe) {
            if (player.isDead) return;

            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;

            const barWidth = 50;
            const barHeight = 6;
            const hpRatio = Math.max(0, player.hp) / player.maxHp;

            ctx.fillStyle = "#222";
            ctx.fillRect(screenX - barWidth / 2, screenY - 34, barWidth, barHeight);

            ctx.fillStyle = isMe ? "#4ade80" : "#60a5fa";
            ctx.fillRect(screenX - barWidth / 2, screenY - 34, barWidth * hpRatio, barHeight);
        }

        function drawNpc(npc, camera) {
            const screenX = npc.x - camera.x;
            const screenY = npc.y - camera.y;

            ctx.beginPath();
            ctx.arc(screenX, screenY, npc.radius, 0, Math.PI * 2);
            ctx.fillStyle = npc.color;
            ctx.fill();

            if (npc.id === selectedNpcId) {
                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            const barWidth = 50;
            const barHeight = 6;
            const hpRatio = npc.hp / npc.maxHp;

            ctx.fillStyle = "#222";
            ctx.fillRect(screenX - barWidth / 2, screenY - 36, barWidth, barHeight);

            ctx.fillStyle = "#ff4444";
            ctx.fillRect(screenX - barWidth / 2, screenY - 36, barWidth * hpRatio, barHeight);
        }

        function drawLasers(camera) {
            for (const laser of lasers) {
                ctx.strokeStyle = "#ff2d55";
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(laser.fromX - camera.x, laser.fromY - camera.y);
                ctx.lineTo(laser.toX - camera.x, laser.toY - camera.y);
                ctx.stroke();
            }
        }

        function drawNpcLasers(camera) {
            for (const laser of npcLasers) {
                ctx.strokeStyle = "#ffd60a";
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(laser.fromX - camera.x, laser.fromY - camera.y);
                ctx.lineTo(laser.toX - camera.x, laser.toY - camera.y);
                ctx.stroke();
            }
        }

        function drawExplosions(camera) {
            for (const explosion of explosions) {
                ctx.save();
                ctx.globalAlpha = explosion.alpha;
                ctx.beginPath();
                ctx.arc(
                    explosion.x - camera.x,
                    explosion.y - camera.y,
                    explosion.radius,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = explosion.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function updateMovement() {
            const me = getMyPlayer();
            if (!me) return;
            if (me.isDead) return;

            let targetXLocal = me.x;
            let targetYLocal = me.y;

            if (mouseDown) {
                targetXLocal = mouseX;
                targetYLocal = mouseY;
            } else if (targetMode) {
                targetXLocal = targetX;
                targetYLocal = targetY;
            } else {
                me.speed *= 0.9;
            }

            const dx = targetXLocal - me.x;
            const dy = targetYLocal - me.y;
            const distance = Math.hypot(dx, dy);

            if (distance > 3) {
                me.speed += 0.3;
                me.speed = Math.min(me.speed, MAX_SPEED);

                const moveAngle = Math.atan2(dy, dx);

                me.vx = Math.cos(moveAngle) * me.speed;
                me.vy = Math.sin(moveAngle) * me.speed;
            } else {
                if (targetMode) {
                    targetMode = false;
                }

                me.speed *= 0.85;
                me.vx *= 0.85;
                me.vy *= 0.85;
            }

            me.x += me.vx;
            me.y += me.vy;

            me.x = Math.max(10, Math.min(WORLD_WIDTH - 10, me.x));
            me.y = Math.max(10, Math.min(WORLD_HEIGHT - 10, me.y));

            if (attacking && selectedNpcId !== null) {
                const npc = getSelectedNpc();

                if (npc) {
                    const aimDx = npc.x - me.x;
                    const aimDy = npc.y - me.y;
                    me.angle = Math.atan2(aimDy, aimDx) + Math.PI / 2;
                }
            } else {
                if (Math.abs(me.vx) > 0.01 || Math.abs(me.vy) > 0.01) {
                    me.angle = Math.atan2(me.vy, me.vx) + Math.PI / 2;
                }
            }

            socket.emit("move", {
                x: me.x,
                y: me.y,
                angle: me.angle
            });
        }

        function updateNpcMovement() {
            const me = getMyPlayer();

            for (const npc of npcs) {
                let targetX = npc.homeX;
                let targetY = npc.homeY;
                let speed = npc.moveSpeed;

                if (me && !me.isDead) {
                    const distToPlayer = distanceBetween(npc.x, npc.y, me.x, me.y);

                    if (distToPlayer <= NPC_CHASE_RANGE) {
                        npc.state = "chase";
                    } else if (distToPlayer >= NPC_LOSE_RANGE) {
                        npc.state = "return";
                    }

                    if (npc.state === "chase") {
                        targetX = me.x;
                        targetY = me.y;
                        speed = npc.chaseSpeed;
                    } else if (npc.state === "return") {
                        targetX = npc.homeX;
                        targetY = npc.homeY;
                        speed = npc.moveSpeed;

                        const homeDist = distanceBetween(npc.x, npc.y, npc.homeX, npc.homeY);
                        if (homeDist < 10) {
                            npc.state = "roam";
                        }
                    }
                }

                if (npc.state === "roam") {
                    npc.moveAngle += (Math.random() - 0.5) * 0.08;

                    let nextX = npc.x + Math.cos(npc.moveAngle) * npc.moveSpeed;
                    let nextY = npc.y + Math.sin(npc.moveAngle) * npc.moveSpeed;

                    const distFromHome = distanceBetween(nextX, nextY, npc.homeX, npc.homeY);

                    if (distFromHome > npc.roamRadius) {
                        const angleHome = Math.atan2(npc.homeY - npc.y, npc.homeX - npc.x);
                        npc.moveAngle = angleHome;
                        nextX = npc.x + Math.cos(npc.moveAngle) * npc.moveSpeed;
                        nextY = npc.y + Math.sin(npc.moveAngle) * npc.moveSpeed;
                    }

                    npc.x = Math.max(npc.radius, Math.min(WORLD_WIDTH - npc.radius, nextX));
                    npc.y = Math.max(npc.radius, Math.min(WORLD_HEIGHT - npc.radius, nextY));
                    continue;
                }

                const dx = targetX - npc.x;
                const dy = targetY - npc.y;
                const distance = Math.hypot(dx, dy);

                if (distance > 1) {
                    npc.x += (dx / distance) * speed;
                    npc.y += (dy / distance) * speed;
                }

                npc.x = Math.max(npc.radius, Math.min(WORLD_WIDTH - npc.radius, npc.x));
                npc.y = Math.max(npc.radius, Math.min(WORLD_HEIGHT - npc.radius, npc.y));
            }
        }

        function updateCombat() {
            const me = getMyPlayer();
            if (!me) return;
            if (me.isDead) return;
            if (!attacking) return;
            if (selectedNpcId === null) return;

            const npc = getSelectedNpc();

            if (!npc) {
                attacking = false;
                selectedNpcId = null;
                return;
            }

            const distance = distanceBetween(me.x, me.y, npc.x, npc.y);

            if (distance > LASER_RANGE) {
                return;
            }

            const now = Date.now();

            if (now - lastShotTime < LASER_COOLDOWN) {
                return;
            }

            lastShotTime = now;

            lasers.push({
                fromX: me.x,
                fromY: me.y,
                toX: npc.x,
                toY: npc.y,
                expiresAt: now + 120
            });

            npc.hp -= LASER_DAMAGE;

            if (npc.hp <= 0) {
                credits += npc.rewardCredits;
                crystals += npc.rewardCrystals;

                createExplosion(npc.x, npc.y, "#ff9933", 42);

                const index = npcs.findIndex(n => n.id === npc.id);

                if (index !== -1) {
                    npcs.splice(index, 1);
                }

                selectedNpcId = null;
                attacking = false;
            }
        }

        function updateNpcCombat() {
            const me = getMyPlayer();
            if (!me) return;
            if (me.isDead) return;

            const now = Date.now();

            for (const npc of npcs) {
                const distance = distanceBetween(npc.x, npc.y, me.x, me.y);

                if (distance > NPC_ATTACK_RANGE) {
                    continue;
                }

                if (now - npc.lastAttackTime < NPC_ATTACK_COOLDOWN) {
                    continue;
                }

                npc.lastAttackTime = now;

                npcLasers.push({
                    fromX: npc.x,
                    fromY: npc.y,
                    toX: me.x,
                    toY: me.y,
                    expiresAt: now + 120
                });

                me.hp -= NPC_DAMAGE;

                if (me.hp <= 0) {
                    killPlayer();
                    break;
                }
            }
        }

        function killPlayer() {
            const me = getMyPlayer();
            if (!me) return;

            createExplosion(me.x, me.y, "#60a5fa", 50);

            me.hp = 0;
            me.isDead = true;
            me.respawnAt = Date.now() + PLAYER_RESPAWN_TIME;
            me.speed = 0;
            me.vx = 0;
            me.vy = 0;

            attacking = false;
            selectedNpcId = null;
            mouseDown = false;
            targetMode = false;
        }

        function updateRespawn() {
            const me = getMyPlayer();
            if (!me) return;
            if (!me.isDead) return;

            if (Date.now() < me.respawnAt) {
                return;
            }

            me.isDead = false;
            me.hp = me.maxHp;
            me.x = WORLD_WIDTH / 2;
            me.y = WORLD_HEIGHT / 2;
            me.angle = 0;
            me.speed = 0;
            me.vx = 0;
            me.vy = 0;
        }

        function updateLasers() {
            const now = Date.now();

            for (let i = lasers.length - 1; i >= 0; i--) {
                if (lasers[i].expiresAt <= now) {
                    lasers.splice(i, 1);
                }
            }

            for (let i = npcLasers.length - 1; i >= 0; i--) {
                if (npcLasers[i].expiresAt <= now) {
                    npcLasers.splice(i, 1);
                }
            }
        }

        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                const explosion = explosions[i];
                explosion.radius += 1.8;
                explosion.alpha -= 0.05;

                if (explosion.radius >= explosion.maxRadius || explosion.alpha <= 0) {
                    explosions.splice(i, 1);
                }
            }
        }

        function updateHud() {
            const me = getMyPlayer();

            if (!me) {
                hud.textContent = "Verbinde...";
                return;
            }

            let text = "";
            text += "Verbunden";
            text += " | HP: " + me.hp + "/" + me.maxHp;
            text += " | Credits: " + credits;
            text += " | Kristalle: " + crystals;

            const npc = getSelectedNpc();
            if (npc) {
                text += " | Ziel: NPC " + npc.id + " (" + npc.hp + "/" + npc.maxHp + " HP)";
            }

            if (attacking) {
                text += " | Angriff aktiv";
            }

            if (me.isDead) {
                const seconds = Math.max(0, Math.ceil((me.respawnAt - Date.now()) / 1000));
                text += " | Zerstört - Respawn in " + seconds + "s";
            }

            text += " | STRG = Angriff an/aus | ESC = Ziel löschen";

            hud.textContent = text;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camera = getCameraOffset();

            drawStars(camera);

            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 4;
            ctx.strokeRect(-camera.x, -camera.y,
                WORLD_WIDTH,
                WORLD_HEIGHT
            );

            for (const npc of npcs) {
                drawNpc(npc, camera);
            }

            drawLasers(camera);
            drawNpcLasers(camera);
            drawExplosions(camera);

            for (const id in players) {
                const p = players[id];
                const isMe = id === myId;

                drawShip(
                    p.x - camera.x,
                    p.y - camera.y,
                    p.angle || 0,
                    p.color || "#4da6ff",
                    isMe, !!p.isDead
                );

                if (typeof p.hp === "number" && typeof p.maxHp === "number") {
                    drawPlayerHpBar(p, camera, isMe);
                }
            }

            updateHud();
            requestAnimationFrame(gameLoop);
        }

        socket.on("connect", () => {
            myId = socket.id;
            hud.textContent = "Verbunden";
        });

        socket.on("currentPlayers", (serverPlayers) => {
            for (const id in serverPlayers) {
                players[id] = serverPlayers[id];
            }

            if (myId && players[myId]) {
                ensureMyPlayerDefaults();
                if (typeof players[myId].x !== "number") players[myId].x = WORLD_WIDTH / 2;
                if (typeof players[myId].y !== "number") players[myId].y = WORLD_HEIGHT / 2;
            }
        });

        socket.on("newPlayer", (player) => {
            players[player.id] = player;
        });

        socket.on("playerMoved", (player) => {
            if (player.id === myId) return;

            if (!players[player.id]) {
                players[player.id] = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle || 0,
                    color: "#4da6ff",
                    hp: PLAYER_MAX_HP,
                    maxHp: PLAYER_MAX_HP,
                    isDead: false,
                    respawnAt: 0
                };
            } else {
                players[player.id].x = player.x;
                players[player.id].y = player.y;
                players[player.id].angle = player.angle || 0;
            }
        });

        socket.on("playerDisconnected", (id) => {
            delete players[id];
        });

        canvas.addEventListener("mousemove", (event) => {
            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            if (mouseDown) {
                movedWhileHolding = true;
            }
        });

        canvas.addEventListener("mousedown", (event) => {
            const me = getMyPlayer();
            if (!me || me.isDead) return;
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            const clickedNpc = getNpcAtPosition(pos.x, pos.y);

            if (clickedNpc) {
                selectedNpcId = clickedNpc.id;
                mouseDown = false;
                targetMode = false;
                return;
            }

            mouseDown = true;
            mouseDownTime = Date.now();
            movedWhileHolding = false;
            targetMode = false;
        });

        canvas.addEventListener("dblclick", (event) => {
            const me = getMyPlayer();
            if (!me || me.isDead) return;

            const pos = getMousePos(event);
            const clickedNpc = getNpcAtPosition(pos.x, pos.y);

            if (clickedNpc) {
                selectedNpcId = clickedNpc.id;
                attacking = true;
            }
        });

        canvas.addEventListener("mouseup", (event) => {
            const me = getMyPlayer();
            if (!me || me.isDead) return;
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            const holdDuration = Date.now() - mouseDownTime;

            mouseDown = false;

            if (holdDuration < 180 && !movedWhileHolding) {
                targetX = pos.x;
                targetY = pos.y;
                targetMode = true;
            }
        });

        canvas.addEventListener("mouseleave", () => {
            mouseDown = false;
        });

        window.addEventListener("keydown", (event) => {
            const me = getMyPlayer();
            if (!me || me.isDead) return;

            if (event.key === "Control") {
                if (selectedNpcId !== null) {
                    attacking = !attacking;
                }
            }

            if (event.key === "Escape") {
                attacking = false;
                selectedNpcId = null;
            }
        });

        window.addEventListener("resize", resizeCanvas);

        resizeCanvas();

        setInterval(updateMovement, 1000 / 60);
        setInterval(updateNpcMovement, 1000 / 60);
        setInterval(updateCombat, 1000 / 60);
        setInterval(updateNpcCombat, 1000 / 60);
        setInterval(updateLasers, 1000 / 60);
        setInterval(updateExplosions, 1000 / 60);
        setInterval(updateRespawn, 200);

        gameLoop();
    </script>
</body>

</html>
