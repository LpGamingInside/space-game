<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Game</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
        }
        
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 14px;
            border-radius: 10px;
            z-index: 10;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
            background: radial-gradient(circle at 20% 20%, #1a1a2e 0%, #050510 35%, #000000 100%);
        }
    </style>
</head>

<body>
    <div id="hud">Verbinde...</div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const hud = document.getElementById("hud");

        const players = {};
        let myId = null;

        let mouseX = 0;
        let mouseY = 0;
        let mouseHeld = false;
        let clickMoveActive = false;
        let clickTargetX = 0;
        let clickTargetY = 0;

        const SHIP_SPEED = 4;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function drawStars() {
            for (let i = 0; i < 100; i++) {
                const x = (i * 97) % canvas.width;
                const y = (i * 53) % canvas.height;
                ctx.fillStyle = "white";
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawShip(x, y, angle, color, isMe) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(11, 12);
            ctx.lineTo(0, 6);
            ctx.lineTo(-11, 12);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();

            if (isMe) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore();
        }

        function clampPlayer(p) {
            p.x = Math.max(12, Math.min(canvas.width - 12, p.x));
            p.y = Math.max(18, Math.min(canvas.height - 12, p.y));
        }

        function moveTowardsTarget(targetX, targetY) {
            if (!myId || !players[myId]) return;

            const me = players[myId];
            const dx = targetX - me.x;
            const dy = targetY - me.y;
            const distance = Math.hypot(dx, dy);

            if (distance < 1) return;

            const angle = Math.atan2(dy, dx) + Math.PI / 2;
            me.angle = angle;

            const step = Math.min(SHIP_SPEED, distance);
            me.x += (dx / distance) * step;
            me.y += (dy / distance) * step;

            clampPlayer(me);

            socket.emit("move", {
                x: me.x,
                y: me.y,
                angle: me.angle
            });
        }

        function updateMovement() {
            if (!myId || !players[myId]) return;

            if (mouseHeld) {
                moveTowardsTarget(mouseX, mouseY);
                return;
            }

            if (clickMoveActive) {
                const me = players[myId];
                const dx = clickTargetX - me.x;
                const dy = clickTargetY - me.y;
                const distance = Math.hypot(dx, dy);

                if (distance <= SHIP_SPEED) {
                    me.x = clickTargetX;
                    me.y = clickTargetY;
                    clampPlayer(me);
                    socket.emit("move", {
                        x: me.x,
                        y: me.y,
                        angle: me.angle || 0
                    });
                    clickMoveActive = false;
                    return;
                }

                moveTowardsTarget(clickTargetX, clickTargetY);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();

            for (const id in players) {
                const p = players[id];
                drawShip(
                    p.x,
                    p.y,
                    p.angle || 0,
                    p.color || "#4da6ff",
                    id === myId
                );
            }

            requestAnimationFrame(gameLoop);
        }

        socket.on("connect", () => {
            myId = socket.id;
            hud.textContent = "Verbunden";
        });

        socket.on("currentPlayers", (serverPlayers) => {
            for (const id in serverPlayers) {
                players[id] = serverPlayers[id];
            }
        });

        socket.on("newPlayer", (player) => {
            players[player.id] = player;
        });

        socket.on("playerMoved", (player) => {
            if (player.id === myId) return;

            if (!players[player.id]) {
                players[player.id] = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle || 0,
                    color: "#4da6ff"
                };
            } else {
                players[player.id].x = player.x;
                players[player.id].y = player.y;
                players[player.id].angle = player.angle || 0;
            }
        });

        socket.on("playerDisconnected", (id) => {
            delete players[id];
        });

        canvas.addEventListener("mousemove", (event) => {
            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;
        });

        canvas.addEventListener("mousedown", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            mouseHeld = true;
            clickMoveActive = false;
        });

        canvas.addEventListener("mouseup", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            mouseHeld = false;
        });

        canvas.addEventListener("click", (event) => {
            const pos = getMousePos(event);
            clickTargetX = pos.x;
            clickTargetY = pos.y;
            clickMoveActive = true;
        });

        canvas.addEventListener("mouseleave", () => {
            mouseHeld = false;
        });

        window.addEventListener("resize", resizeCanvas);

        resizeCanvas();
        setInterval(updateMovement, 1000 / 60);
        gameLoop();
    </script>
</body>

</html>
