<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Game</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
        }
        
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 14px;
            border-radius: 10px;
            z-index: 10;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
            background: radial-gradient(circle at 20% 20%, #1a1a2e 0%, #050510 35%, #000000 100%);
        }
    </style>
</head>

<body>
    <div id="hud">Verbinde...</div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const hud = document.getElementById("hud");
        const WORLD_WIDTH = 5000;
        const WORLD_HEIGHT = 5000;

        const players = {};
        let myId = null;

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let targetMode = false;
        let targetX = 0;
        let targetY = 0;
        let mouseDownTime = 0;
        let movedWhileHolding = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            const camera = getCameraOffset();

            return {
                x: (event.clientX - rect.left) + camera.x,
                y: (event.clientY - rect.top) + camera.y
            };
        }

        function drawStars(camera) {
            for (let i = 0; i < 500; i++) {
                const x = ((i * 97) % WORLD_WIDTH) - camera.x;
                const y = ((i * 53) % WORLD_HEIGHT) - camera.y;

                ctx.fillStyle = "white";
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawShip(x, y, angle, color, isMe) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(11, 12);
            ctx.lineTo(0, 6);
            ctx.lineTo(-11, 12);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();

            if (isMe) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore();
        }

        function getCameraOffset() {
            if (!myId || !players[myId]) {
                return {
                    x: 0,
                    y: 0
                };
            }

            const me = players[myId];

            return {
                x: me.x - canvas.width / 2,
                y: me.y - canvas.height / 2
            };
        }

        function updateMovement() {
            if (!myId || !players[myId]) return;

            const me = players[myId];

            if (typeof me.speed !== "number") me.speed = 0;
            if (typeof me.vx !== "number") me.vx = 0;
            if (typeof me.vy !== "number") me.vy = 0;
            if (typeof me.angle !== "number") me.angle = 0;

            let targetXLocal = me.x;
            let targetYLocal = me.y;

            if (mouseDown) {
                targetXLocal = mouseX;
                targetYLocal = mouseY;
            } else if (targetMode) {
                targetXLocal = targetX;
                targetYLocal = targetY;
            } else {
                me.speed *= 0.9;
            }

            const dx = targetXLocal - me.x;
            const dy = targetYLocal - me.y;
            const distance = Math.hypot(dx, dy);

            if (distance > 3) {
                const desiredAngle = Math.atan2(dy, dx) + Math.PI / 2;

                let diff = desiredAngle - me.angle;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                me.angle += diff * 0.15;

                me.speed += 0.3;
                me.speed = Math.min(me.speed, 5);

                me.vx = Math.sin(me.angle) * me.speed;
                me.vy = -Math.cos(me.angle) * me.speed;
            } else {
                if (targetMode) {
                    targetMode = false;
                }
                me.speed *= 0.85;
                me.vx *= 0.85;
                me.vy *= 0.85;
            }

            me.x += me.vx;
            me.y += me.vy;

            me.x = Math.max(10, Math.min(WORLD_WIDTH - 10, me.x));
            me.y = Math.max(10, Math.min(WORLD_HEIGHT - 10, me.y));

            socket.emit("move", {
                x: me.x,
                y: me.y,
                angle: me.angle
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camera = getCameraOffset();

            drawStars(camera);

            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 4;
            ctx.strokeRect(-camera.x, -camera.y,
                WORLD_WIDTH,
                WORLD_HEIGHT
            );

            for (const id in players) {
                const p = players[id];

                drawShip(
                    p.x - camera.x,
                    p.y - camera.y,
                    p.angle || 0,
                    p.color || "#4da6ff",
                    id === myId
                );
            }

            requestAnimationFrame(gameLoop);
        }

        socket.on("connect", () => {
            myId = socket.id;
            hud.textContent = "Verbunden";
        });

        socket.on("currentPlayers", (serverPlayers) => {
            for (const id in serverPlayers) {
                players[id] = serverPlayers[id];
            }
        });

        socket.on("newPlayer", (player) => {
            players[player.id] = player;
        });

        socket.on("playerMoved", (player) => {
            if (player.id === myId) return;

            if (!players[player.id]) {
                players[player.id] = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle || 0,
                    color: "#4da6ff"
                };
            } else {
                players[player.id].x = player.x;
                players[player.id].y = player.y;
                players[player.id].angle = player.angle || 0;
            }
        });

        socket.on("playerDisconnected", (id) => {
            delete players[id];
        });

        canvas.addEventListener("mousemove", (event) => {
            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            if (mouseDown) {
                movedWhileHolding = true;
            }
        });

        canvas.addEventListener("mousedown", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            mouseDown = true;
            mouseDownTime = Date.now();
            movedWhileHolding = false;
            targetMode = false;
        });

        canvas.addEventListener("mouseup", (event) => {
            if (event.button !== 0) return;

            const pos = getMousePos(event);
            mouseX = pos.x;
            mouseY = pos.y;

            const holdDuration = Date.now() - mouseDownTime;

            mouseDown = false;

            if (holdDuration < 180 && !movedWhileHolding) {
                targetX = pos.x;
                targetY = pos.y;
                targetMode = true;
            }
        });

        canvas.addEventListener("mouseleave", () => {
            mouseDown = false;
        });

        window.addEventListener("resize", resizeCanvas);

        resizeCanvas();
        setInterval(updateMovement, 1000 / 60);
        gameLoop();
    </script>
</body>

</html>
