<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Game - Start</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="menu-page">
    <div class="topbar">
        <div class="brand">Space Game</div>
        <div class="resources" id="resourceBar"></div>
    </div>

    <div class="page-wrap">
        <div class="hero-box">
            <div class="hero-title">Willkommen im Hangar-Netzwerk</div>
            <div class="hero-subtitle">
                Verwalte deine Schiffe, rüste dein Loadout aus und springe dann direkt ins All.
            </div>

            <div class="button-row">
                <a class="btn" href="hangar.html">Zum Hangar</a>
                <a class="btn" href="shop.html">Zum Shop</a>
                <a class="btn secondary" href="game.html">Direkt ins Spiel</a>
                <button class="btn secondary" id="resetButton">Spielstand zurücksetzen</button>
            </div>

            <div class="footer-note">
                Nächster Ausbau: Shop, Drohnen, Extras, Schiffsbilder und echtes Ausrüstungssystem.
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/save.js"></script>
    <script>
        const save = loadGame();
        const activeShip = getActiveShip(save);
        const resourceBar = document.getElementById("resourceBar");
        const resetButton = document.getElementById("resetButton");

        function renderTopbar() {
            const xpNeeded = getXpNeededForLevel(save.level);

            resourceBar.innerHTML = `
                <div>Credits: ${save.credits}</div>
                <div>Kristalle: ${save.crystals}</div>
                <div>Level: ${save.level}</div>
                <div>XP: ${save.xp}/${xpNeeded}</div>
                <div>Aktives Schiff: ${activeShip ? activeShip.name : "-"}</div>
            `;
        }

        resetButton.addEventListener("click", () => {
            resetGame();
            location.reload();
        });

        renderTopbar();
    </script>
</body>

</html>
